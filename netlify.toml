[build]
  command = "prisma generate && next build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  PRISMA_GENERATE_DATAPROXY = "false"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Force-serve the Ghost Chat static files from public/ regardless of Next.js routing
[[redirects]]
  from = "/ghost"
  to = "/ghost.html"
  status = 200
  force = true

[[redirects]]
  from = "/portable"
  to = "/ghost-portable.html"
  status = 200
  force = true
