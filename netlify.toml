[build]
  command = "rm -rf node_modules/.prisma node_modules/@prisma/client/runtime && prisma generate && next build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  PRISMA_GENERATE_DATAPROXY = "false"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Canonical short URL for the portable demo (the /ghost short alias collides with
# next-intl middleware which treats unknown roots as locale candidates, so we
# only ship the /portable one — share /ghost.html directly for the hosted variant).
[[redirects]]
  from = "/portable"
  to = "/ghost-portable.html"
  status = 200
  force = true
